name: Refresh projects

# Keeps data/projects.json in sync with GitHub: refreshes existing entries and
# auto-adds newly-created AI/ML repos. Commits to main, which triggers the Pages
# build, so the live site updates with no manual step.

on:
  schedule:
    - cron: "17 6 * * *"   # daily at 06:17 UTC
  workflow_dispatch:        # manual "Run workflow" button

permissions:
  contents: write

concurrency:
  group: refresh-projects
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Refresh data from GitHub API
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/refresh.mjs

      - name: Commit & push if changed
        run: |
          if git diff --quiet -- data/projects.json; then
            echo "No changes to data/projects.json."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/projects.json
            git commit -m "chore: auto-refresh projects from GitHub API"
            git push
          fi
